<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NOW · Uploader</title>
<style>
  :root { --bg:#0f0f2d; --deep:#080818; --card:#141430; --panel:#1e1e40; --border:#2e2e52; --text:#ababc8; --heading:#fff; --muted:#5a5a80; --brand:#5149e6; --brand-l:#8a74ff; --accent:#ffac34; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; padding:40px 20px; }
  .wrap { max-width:640px; margin:0 auto; display:flex; flex-direction:column; gap:24px; }
  h1 { color:var(--heading); font-size:22px; margin:0; letter-spacing:-0.01em; }
  h1 small { color:var(--muted); font-weight:400; font-size:13px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px; }
  h2 { color:var(--heading); font-size:15px; margin:0 0 16px; }
  label { display:block; color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:0.08em; margin:0 0 6px; }
  input, .drop { width:100%; background:var(--deep); border:1px solid var(--border); border-radius:8px; color:var(--heading); font:inherit; padding:10px 12px; }
  input:focus { outline:none; border-color:var(--brand); }
  .row { display:flex; gap:12px; }
  .row > * { flex:1; }
  .drop { border-style:dashed; text-align:center; padding:32px; cursor:pointer; color:var(--muted); transition:border-color .15s,background .15s; }
  .drop.over { border-color:var(--brand); background:color-mix(in srgb,var(--brand) 12%,var(--deep)); color:var(--heading); }
  button { background:var(--brand); color:#fff; border:0; border-radius:8px; font:inherit; font-weight:600; padding:10px 18px; cursor:pointer; margin-top:16px; }
  button:hover { background:var(--brand-l); }
  .out { margin-top:16px; font-family:ui-monospace,monospace; font-size:13px; white-space:pre-wrap; word-break:break-all; color:var(--brand-l); }
  .status { font-size:13px; }
  .ok { color:#22c55e; } .err { color:#ef4444; }
  a { color:var(--brand-l); }
</style>
</head>
<body>
<div class="wrap">
  <h1>NOW · Uploader <small id="site"></small></h1>
  <div class="status" id="health">Checking connection…</div>

  <div class="card">
    <h2>Upload media</h2>
    <div class="drop" id="drop">Drop an image here, or click to choose</div>
    <input type="file" id="file" accept="image/*" hidden>
    <div class="row" style="margin-top:12px">
      <div><label>Alt text (optional)</label><input id="alt" placeholder="NowPlix glass render"></div>
    </div>
    <button id="upload">Upload to media library</button>
    <div class="out" id="uploadOut"></div>
  </div>

  <div class="card">
    <h2>Set featured image</h2>
    <div class="row">
      <div><label>Post ID</label><input id="postId" inputmode="numeric" placeholder="76"></div>
      <div><label>Media ID</label><input id="mediaId" inputmode="numeric" placeholder="180"></div>
    </div>
    <button id="setFeatured">Set featured</button>
    <div class="out" id="featOut"></div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const show = (el, obj, ok=true) => { el.textContent = typeof obj === 'string' ? obj : JSON.stringify(obj, null, 2); el.className = 'out ' + (ok ? '' : 'err'); };

fetch('/api/health').then(r=>r.json()).then(d=>{
  const h = $('health');
  if (d.ok) { h.innerHTML = '<span class="ok">✓ Connected</span> as ' + d.user + ' (' + (d.roles||[]).join(', ') + ')'; $('site').textContent = '· ' + d.site.replace(/^https?:\/\//,''); }
  else { h.innerHTML = '<span class="err">✗ ' + (d.error || d.message || 'Not connected') + '</span>'; }
}).catch(e=>{ $('health').innerHTML = '<span class="err">✗ ' + e + '</span>'; });

const drop = $('drop'), fileInput = $('file');
let chosen = null;
const pick = (f) => { chosen = f; drop.textContent = f ? f.name : 'Drop an image here, or click to choose'; };
drop.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => pick(fileInput.files[0]));
['dragover','dragenter'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('over'); }));
['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('over'); }));
drop.addEventListener('drop', e => pick(e.dataTransfer.files[0]));

$('upload').addEventListener('click', async () => {
  if (!chosen) return show($('uploadOut'), 'Choose a file first.', false);
  show($('uploadOut'), 'Uploading…');
  const fd = new FormData();
  fd.append('file', chosen);
  if ($('alt').value) fd.append('alt', $('alt').value);
  try {
    const r = await fetch('/api/media', { method:'POST', body: fd });
    const d = await r.json();
    show($('uploadOut'), d, r.ok);
    if (r.ok && d.id) $('mediaId').value = d.id;
  } catch (e) { show($('uploadOut'), String(e), false); }
});

$('setFeatured').addEventListener('click', async () => {
  show($('featOut'), 'Setting…');
  try {
    const r = await fetch('/api/featured', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ postId: $('postId').value, mediaId: $('mediaId').value }) });
    const d = await r.json();
    show($('featOut'), d, r.ok);
  } catch (e) { show($('featOut'), String(e), false); }
});
</script>
</body>
</html>
