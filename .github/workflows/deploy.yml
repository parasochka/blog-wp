name: Deploy theme

# Deploys the NOW block theme to the self-hosted WordPress server over SSH.
# Runs on pushes to the working branch, plus manual dispatch.
# If the SSH secrets are not configured yet, the job validates the theme
# and exits cleanly (no failure email) instead of erroring on deploy.

on:
  push:
    branches:
      - claude/wordpress-figma-theme-59xsom
      - main
    paths-ignore:
      - '**.md'
      - '.github/**'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate theme.json
        run: |
          python3 -c "import json; json.load(open('theme.json')); print('theme.json is valid JSON')"

      - name: Check deploy configuration
        id: preflight
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          WP_THEME_PATH: ${{ secrets.WP_THEME_PATH }}
        run: |
          if [ -n "$SSH_HOST" ] && [ -n "$SSH_USER" ] && [ -n "$SSH_KEY" ] && [ -n "$WP_THEME_PATH" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "✅ Deploy secrets present — proceeding to deploy."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Deploy skipped::SSH secrets not set (SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, WP_THEME_PATH). Theme validated only. Add the secrets in Settings → Secrets and variables → Actions to enable auto-deploy."
          fi

      - name: Set up SSH
        if: steps.preflight.outputs.configured == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}

      - name: Deploy via rsync
        if: steps.preflight.outputs.configured == 'true'
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude '*.md' \
            --exclude '.gitignore' \
            -e "ssh -i ~/.ssh/deploy_key -p ${SSH_PORT:-22}" \
            ./ "${SSH_USER}@${SSH_HOST}:${WP_THEME_PATH}/"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          WP_THEME_PATH: ${{ secrets.WP_THEME_PATH }}

      - name: Flush WordPress cache (optional, needs WP-CLI on server)
        if: steps.preflight.outputs.configured == 'true'
        continue-on-error: true
        run: |
          if [ -z "$WP_PATH" ]; then
            echo "WP_PATH not set — skipping cache flush."
            exit 0
          fi
          ssh -i ~/.ssh/deploy_key -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" \
            "cd ${WP_PATH} && wp cache flush && wp theme activate now-blog || true"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          WP_PATH: ${{ secrets.WP_PATH }}
